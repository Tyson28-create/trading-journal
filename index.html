<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Trader Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a; --card-dark: #1e293b; --border: #334155;
            --accent: #38bdf8; --win: #10b981; --loss: #f43f5e;
            --text-main: #f1f5f9; --text-dim: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header-controls { display: flex; align-items: center; gap: 10px; }
        .sync-btn { background: var(--accent); color: var(--bg-dark); padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
        select, input { background: var(--card-dark); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card-dark); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0; font-size: 1.8rem; font-weight: 700; }
        .chart-container { background: var(--card-dark); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; height: 350px; }
        form { background: var(--card-dark); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; border: 1px solid var(--border); }
        .table-wrapper { background: var(--card-dark); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 15px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #33415555; }
        .win-text { color: var(--win); }
        .loss-text { color: var(--loss); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Journal<span style="color:var(--accent)">.</span></h1>
            <div class="header-controls">
                <select id="account-filter" onchange="switchAccount()"></select>
                <input type="file" id="import-json" style="display:none">
                <button class="sync-btn" onclick="document.getElementById('import-json').click()">🔄 Sync MT5 Data</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Net Profit</h3><p id="total-pnl">0.00</p></div>
            <div class="stat-card"><h3>Win Rate</h3><p id="win-rate">0%</p></div>
            <div class="stat-card"><h3>Total Trades</h3><p id="trade-count">0</p></div>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; background: var(--card-dark); padding: 10px; border-radius: 8px; border: 1px solid var(--border); width: fit-content;">
            <span style="font-size: 0.9rem; color: var(--text-dim);">Timeframe:</span>
            <select id="period-filter" onchange="renderTrades()" style="padding: 5px; border: none; background: transparent; color: white;">
                <option value="all">All Time</option>
                <option value="7">Last 7 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Asset Breakdown</h3><div id="asset-pnl-list" style="font-size: 0.9rem; margin-top:10px; max-height: 150px; overflow-y: auto;"></div></div>
            <div class="stat-card"><h3>Performance by Day</h3><div id="day-performance" style="font-size: 0.9rem; margin-top:10px;"></div></div>
            <div class="stat-card"><h3>Directional WR</h3><div id="direction-stats" style="font-size: 0.9rem; margin-top:10px;"></div></div>
        </div>

        <div class="chart-container"><canvas id="equityChart"></canvas></div>

        <form id="trade-form">
            <input type="date" id="date" required>
            <input type="text" id="asset" placeholder="Asset" required>
            <select id="type"><option value="Long">Long</option><option value="Short">Short</option></select>
            <input type="number" step="0.01" id="pnl" placeholder="P&L Amount" required>
            <input type="text" id="account-name" placeholder="Account Name" value="Default">
            <button type="submit" class="sync-btn" style="background:var(--win); color: white;">Add Trade</button>
        </form>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>Date</th><th>Asset</th><th>Type</th><th>P&L</th><th>Action</th></tr></thead>
                <tbody id="trade-log"></tbody>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
